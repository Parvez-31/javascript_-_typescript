<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Post - Method</title>
  </head>
  <body>
    <h2>User Form</h2>

    <form id="user-form">
      <input type="text" placeholder="Enter product name" id="user-product" />
      <br /><br />
      <input type="number" placeholder="Enter product price" id="price" />
      <br /><br />
      <button type="submit">send</button>
    </form>

    <!-- js start -->
    <script>
      document
        .getElementById("user-form")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const userProduct = document.getElementById("user-product").value;
          const price = document.getElementById("price").value;

          try {
            const res = await fetch(
              "https://jsonplaceholder.typicode.com/posts",
              {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                },
                body: JSON.stringify({
                  productName: userProduct,
                  price: Number(price),
                  userId: Date.now(),
                }),
              },
            );
            const data = await res.json();
            console.log("success", data);
          } catch (error) {
            console.error("Error:", error);
          }
        });
    </script>
  </body>
</html>
